name: Checks
on:
  push:
    branches:
  pull_request:

permissions: {}

jobs:
  tests:
    name: Tests
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version:
        - "3.10"
        - "3.11"
        - "3.12"
        - "3.13"
        - "3.14"
    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install --group test .
    - name: Run tests
      run: pytest

  static-analysis:
    name: Static code analysis
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false
    - uses: actions/setup-python@v6
      with:
        python-version: "3.14"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install --group static-analysis
    - name: Run static code analysis
      run: |
        ruff check --output-format github
        ruff format --check --preview --output-format github

  type-checking:
    name: Type checking
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      matrix:
        checker:
        - mypy
        - pyright
    env:
      CHECKER: ${{ matrix.checker }}
    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false
    - uses: actions/setup-python@v6
      with:
        python-version: "3.14"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install --group "${CHECKER}" .
    - name: Run type tests
      run: |
        "${CHECKER}" src/ tests/

  all:
    needs:
    - tests
    - static-analysis
    - type-checking
    runs-on: ubuntu-latest
    steps:
    - run: |
        true
